# Explore — Netlify (frontend + waitlist function)

[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**"]

# Waitlist + welcome email (works without Railway API)
[[redirects]]
  from = "/api/waitlist/signup"
  to = "/.netlify/functions/waitlist-signup"
  status = 200
  force = true

# Optional: proxy other API routes to Railway/Render
# [[redirects]]
#   from = "/api/*"
#   to = "https://YOUR-API.up.railway.app/api/:splat"
#   status = 200
#   force = true

# SPA — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
