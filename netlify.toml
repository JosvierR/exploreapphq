# Explore — Netlify (frontend)
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

# 1) API proxy — must be ABOVE the SPA rule. Uncomment after deploying server/ to Railway/Render.
# [[redirects]]
#   from = "/api/*"
#   to = "https://YOUR-API-URL.up.railway.app/api/:splat"
#   status = 200
#   force = true

# 2) SPA — React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
