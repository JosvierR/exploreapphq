apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    # path_prefix=/loki in loki-config.yml — Grafana must target the prefixed base URL.
    url: http://loki:3100/loki
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields: []
