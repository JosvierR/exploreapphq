<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>Under construction</title>
    <link rel="icon" href="assets/images/favicon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,500;0,9..40,700;1,9..40,500&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: "DM Sans", system-ui, sans-serif;
            color: #f0f0f5;
            overflow: hidden;
            min-height: 100%;
            position: relative;
            background: #0f0f18;
        }

        .bg {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 100% 80% at 20% 10%, rgba(255, 122, 51, 0.22) 0%, transparent 50%),
                radial-gradient(ellipse 80% 60% at 85% 70%, rgba(120, 90, 255, 0.18) 0%, transparent 45%),
                radial-gradient(ellipse 60% 50% at 50% 100%, rgba(30, 180, 200, 0.12) 0%, transparent 55%),
                linear-gradient(165deg, #16162a 0%, #0f0f18 40%, #12121c 100%);
            animation: bg-drift 14s ease-in-out infinite alternate;
        }
        @keyframes bg-drift {
            0% { filter: hue-rotate(0deg) brightness(1); transform: scale(1); }
            100% { filter: hue-rotate(18deg) brightness(1.05); transform: scale(1.03); }
        }

        .grid {
            position: fixed;
            inset: -50%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            animation: grid-move 20s linear infinite;
            pointer-events: none;
            opacity: 0.5;
        }
        @keyframes grid-move {
            0% { transform: translate(0, 0) rotate(0.5deg); }
            100% { transform: translate(-48px, -48px) rotate(0.5deg); }
        }

        .tape {
            position: fixed;
            left: -20%;
            width: 140%;
            height: 28px;
            background: repeating-linear-gradient(
                -45deg,
                #ff7a33 0px,
                #ff7a33 14px,
                #1a1a2e 14px,
                #1a1a2e 28px
            );
            opacity: 0.85;
            box-shadow: 0 0 20px rgba(255, 122, 51, 0.4);
            animation: tape-slide 3s linear infinite;
            z-index: 1;
            pointer-events: none;
        }
        .tape--top { top: 12%; transform: rotate(-3deg); }
        .tape--bottom { bottom: 14%; transform: rotate(2deg); animation-direction: reverse; animation-duration: 3.5s; }
        @keyframes tape-slide {
            0% { background-position: 0 0; }
            100% { background-position: 56px 0; }
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.55;
        }
        .orb--a {
            width: min(45vw, 320px);
            height: min(45vw, 320px);
            background: #ff7a33;
            top: -5%;
            right: -5%;
            animation: orb-a 9s ease-in-out infinite;
        }
        .orb--b {
            width: min(40vw, 280px);
            height: min(40vw, 280px);
            background: #6b5cff;
            bottom: 5%;
            left: -8%;
            animation: orb-b 11s ease-in-out infinite;
        }
        @keyframes orb-a {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, 40px) scale(1.1); }
        }
        @keyframes orb-b {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, -25px) scale(1.08); }
        }

        main {
            position: relative;
            z-index: 2;
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .panel {
            text-align: center;
            max-width: 38rem;
            padding: 2.5rem 2rem;
            border-radius: 24px;
            background: rgba(22, 22, 42, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow:
                0 0 0 1px rgba(255, 122, 51, 0.15) inset,
                0 24px 80px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
            animation: panel-in 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        @keyframes panel-in {
            from { opacity: 0; transform: translateY(24px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .mark-row {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 0.4rem;
            margin-bottom: 1.5rem;
        }
        .mark {
            font-size: clamp(3rem, 10vw, 4.25rem);
            line-height: 1;
            display: inline-block;
            animation: bounce-soft 2.2s ease-in-out infinite;
            filter: drop-shadow(0 12px 28px rgba(255, 122, 51, 0.45));
        }
        .mark--side {
            font-size: clamp(2rem, 6vw, 2.85rem);
            animation-delay: -1.1s;
            filter: drop-shadow(0 10px 24px rgba(107, 92, 255, 0.42));
        }
        @keyframes bounce-soft {
            0%, 100% { transform: translateY(0) rotate(-4deg); }
            50% { transform: translateY(-10px) rotate(4deg); }
        }

        .sparkles {
            font-size: 1.25rem;
            letter-spacing: 0.35em;
            margin-bottom: 1.75rem;
            color: rgba(255, 200, 150, 0.9);
        }
        .sparkles span {
            display: inline-block;
            animation: twinkle 1.4s ease-in-out infinite;
        }
        .sparkles span:nth-child(1) { animation-delay: 0s; }
        .sparkles span:nth-child(2) { animation-delay: 0.2s; }
        .sparkles span:nth-child(3) { animation-delay: 0.4s; }
        .sparkles span:nth-child(4) { animation-delay: 0.6s; }
        .sparkles span:nth-child(5) { animation-delay: 0.8s; }
        @keyframes twinkle {
            0%, 100% { opacity: 0.35; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.15); }
        }

        .lines {
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
        }
        .line {
            font-size: clamp(1.05rem, 3.2vw, 1.4rem);
            line-height: 1.5;
            color: #c8c8d4;
            font-style: italic;
            font-weight: 500;
            opacity: 0;
            animation: line-up 0.75s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .line--en {
            font-style: normal;
            color: #fff;
            font-weight: 700;
            animation-delay: 0.35s;
        }
        .line--es { animation-delay: 0.55s; }
        .line--fr { animation-delay: 0.75s; }
        @keyframes line-up {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .divider {
            width: min(12rem, 50vw);
            height: 3px;
            margin: 0.15rem auto;
            border-radius: 99px;
            background: linear-gradient(90deg, transparent, #ff7a33, #ffc49a, #ff7a33, transparent);
            background-size: 200% 100%;
            animation: shimmer 2.5s ease-in-out infinite;
            opacity: 0.85;
        }
        @keyframes shimmer {
            0% { background-position: 100% 50%; }
            100% { background-position: -100% 50%; }
        }

        @media (prefers-reduced-motion: reduce) {
            .bg, .grid, .tape, .orb--a, .orb--b, .mark, .sparkles span, .divider { animation: none !important; }
            .line { opacity: 1; animation: none; transform: none; }
            .panel { animation: none; opacity: 1; transform: none; }
        }
    </style>
</head>
<body>
    <div class="bg" aria-hidden="true"></div>
    <div class="grid" aria-hidden="true"></div>
    <div class="orb orb--a" aria-hidden="true"></div>
    <div class="orb orb--b" aria-hidden="true"></div>
    <div class="tape tape--top" aria-hidden="true"></div>
    <div class="tape tape--bottom" aria-hidden="true"></div>

    <main>
        <div class="panel">
            <div class="mark-row" aria-hidden="true">
                <div class="mark">🚧</div>
                <div class="mark mark--side">🏗️</div>
            </div>
            <p class="sparkles" aria-hidden="true"><span>✦</span><span>✦</span><span>✦</span><span>✦</span><span>✦</span></p>
            <div class="lines">
                <p class="line line--en" lang="en">This is under construction.</p>
                <div class="divider" aria-hidden="true"></div>
                <p class="line line--es" lang="es">Esto está en construcción.</p>
                <div class="divider" aria-hidden="true"></div>
                <p class="line line--fr" lang="fr">C'est en construction.</p>
            </div>
        </div>
    </main>
</body>
</html>
